ktor:
  application:
    modules:
      - com.stor.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0

jwt:
  secret: ${JWT_SECRET}
  issuer: "stor-api"
  audience: "stor-app"
  realm: "stor"
  accessTokenExpiryMs: 900000        # 15 minutes
  refreshTokenExpiryMs: 2592000000   # 30 days

database:
  jdbcUrl: ${DATABASE_URL}
  driverClassName: "org.postgresql.Driver"
  maximumPoolSize: 10
  minimumIdle: 2
  connectionTimeout: 30000
  idleTimeout: 600000
  maxLifetime: 1800000

smtp:
  host: ${?SMTP_HOST}
  port: ${?SMTP_PORT}
  username: ${?SMTP_USERNAME}
  password: ${?SMTP_PASSWORD}
  from: ${?SMTP_FROM}

rateLimit:
  requestsPerSecond: 20
  requestsPerMinute: 200
